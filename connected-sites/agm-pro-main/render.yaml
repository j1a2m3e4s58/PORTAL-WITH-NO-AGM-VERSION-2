services:
  - type: web
    name: agm-pro-backend
    runtime: node
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build:shared-backend
    startCommand: pnpm shared:backend
  - type: web
    name: agm-pro
    env: static
    rootDir: src/frontend
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_RUNTIME_BACKEND_URL
        value: https://agm-pro-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
